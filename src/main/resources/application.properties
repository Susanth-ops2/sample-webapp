# ============================================================
# application.properties
# Java Application Configuration
# This file is used during local development/testing
# In deployment, Ansible generates this via J2 template
# ============================================================

# ── Application Info ────────────────────────────────────────
app.name=sample-webapp
app.version=1.0.0
app.environment=development

# ── Server Config ───────────────────────────────────────────
server.host=localhost
server.port=8080
server.context=/sample-webapp

# ── Database Config ─────────────────────────────────────────
db.host=localhost
db.port=3306
db.name=sampledb
db.username=dbuser
db.password=dbpassword123
db.max.pool.size=10
db.min.pool.size=2

# ── Logging ─────────────────────────────────────────────────
log.level=INFO
log.file=/var/log/sample-webapp/app.log
log.max.size=10MB
log.max.backups=5

# ── Application Features ────────────────────────────────────
feature.debug.mode=false
feature.maintenance.mode=false
feature.max.upload.size=10MB
