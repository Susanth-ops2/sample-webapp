# ============================================================
# inventory.ini — Template
# DO NOT put real passwords here!
# Real credentials come from GitHub Secrets at runtime
#
# This file is used as a TEMPLATE only.
# GitHub Actions generates the real inventory dynamically.
# ============================================================

[windows_servers]
your-pc      ansible_host=YOUR_PC_IP_HERE
ajith-server ansible_host=AJITH_PC_IP_HERE

[windows_servers:vars]
ansible_user=YOUR_WINDOWS_USERNAME
ansible_password=YOUR_WINDOWS_PASSWORD
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_port=5985
ansible_winrm_scheme=http
ansible_winrm_server_cert_validation=ignore
ansible_python_interpreter=auto_silent
