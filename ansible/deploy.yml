# ============================================================
# ansible/deploy.yml — Main Playbook
# Called by GitHub Actions after Maven build
# ============================================================
---
- name: Deploy Sample Web App to Windows Server
  hosts: windows_servers
  gather_facts: yes

  vars:
    java_version: "11"
    java_install_dir: 'C:\Java\jdk-11'
    tomcat_version: "10.1.13"
    tomcat_install_dir: 'C:\Tomcat'
    tomcat_port: 8080
    tomcat_service_name: "Tomcat10"
    app_name: "sample-webapp"
    app_version: "1.0.0"
    app_environment: "staging"
    app_config_dir: 'C:\Tomcat\conf\sample-webapp'
    war_dest: 'C:\Tomcat\webapps\sample-webapp.war'
    log_dir: 'C:\Tomcat\logs'
    jvm_xms: "256M"
    jvm_xmx: "512M"
    db_host: "localhost"
    db_port: 3306
    db_name: "sampledb"
    db_username: "appuser"
    db_password: "changeme"
    log_level: "INFO"
    log_max_size: "10MB"
    log_max_backups: 5
    feature_debug_mode: false
    feature_maintenance_mode: false
    feature_max_upload_size: "10MB"

  roles:
    - install-java
    - install-tomcat
    - deploy-app
