# ============================================================
# .github/workflows/cicd-pipeline.yml
# PHASE 1 - LOCALHOST ONLY
# Fix: install pywinrm into exact Python Ansible uses
# ============================================================

name: CI/CD Pipeline - Localhost Only (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Job 1: Maven Build and Test ───────────────────────────
  build:
    name: Maven Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Run Unit Tests
        run: mvn test

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  # ── Job 2: Deploy to YOUR Windows PC ──────────────────────
  deploy-localhost:
    name: Deploy to Localhost
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Install Ansible and pywinrm (FIXED)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible python3-pip python3-dev

          # Find exact Python that Ansible uses
          ANSIBLE_PYTHON=$(ansible --version | grep "python version" | awk '{print $4}' | cut -d'.' -f1,2)
          echo "Ansible Python version: $ANSIBLE_PYTHON"

          PYTHON_BIN=$(which python3)
          echo "Python binary: $PYTHON_BIN"

          # Install pywinrm into that exact Python
          sudo $PYTHON_BIN -m pip install pywinrm --break-system-packages --ignore-installed
          sudo $PYTHON_BIN -m pip install requests-ntlm --break-system-packages --ignore-installed
          sudo $PYTHON_BIN -m pip install requests-credssp --break-system-packages --ignore-installed

          # Verify
          echo "--- Verifying pywinrm ---"
          sudo $PYTHON_BIN -c "import winrm; print('pywinrm OK')"

          # Also install via apt to be safe
          sudo apt-get install -y python3-winrm

          # Final verify
          python3 -c "import winrm; print('winrm accessible')"

      - name: Create inventory for localhost
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          # Get exact python3 path
          PYTHON_PATH=$(which python3)
          echo "Using Python: $PYTHON_PATH"

          cat > ansible/inventory-local.ini << EOF
          [windows_servers]
          your-pc ansible_host=${YOUR_PC_IP}

          [windows_servers:vars]
          ansible_user=${WINDOWS_USER}
          ansible_password=${WINDOWS_PASSWORD}
          ansible_connection=winrm
          ansible_winrm_transport=basic
          ansible_winrm_port=5985
          ansible_winrm_scheme=http
          ansible_winrm_server_cert_validation=ignore
          ansible_python_interpreter=${PYTHON_PATH}
          EOF

          echo "--- Inventory (password hidden) ---"
          grep -v password ansible/inventory-local.ini

      - name: Test WinRM ping to YOUR PC
        run: |
          cd ansible
          ansible windows_servers -i inventory-local.ini -m win_ping -v

      - name: Deploy to YOUR PC via Ansible
        run: |
          cd ansible
          ansible-playbook -i inventory-local.ini deploy.yml \
            --extra-vars "war_src=../target/sample-webapp.war" \
            -v

      - name: Verify app is running
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
        run: |
          echo "Waiting for Tomcat to start..."
          sleep 15
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            http://${YOUR_PC_IP}:8080/sample-webapp/ || echo "Manual check needed"

  # ── Job 3: Summary ────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, deploy-localhost]
    if: always()

    steps:
      - name: Show Results
        run: |
          echo "========================================"
          echo "  PIPELINE SUMMARY (Phase 1 - Localhost)"
          echo "========================================"
          echo "  Build           : ${{ needs.build.result }}"
          echo "  Deploy Localhost: ${{ needs.deploy-localhost.result }}"
          echo "========================================"
          if [ "${{ needs.deploy-localhost.result }}" == "success" ]; then
            echo "SUCCESS - App deployed to your Windows PC!"
          else
            echo "FAILED - Check logs above"
          fi
