name: CI/CD Pipeline - Self Hosted Windows (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy to Localhost
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Install pywinrm and create ansible wrapper
        shell: powershell
        run: |
          $python = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\python.exe"

          # Install pywinrm
          & $python -m pip install pywinrm requests-ntlm --quiet
          & $python -c "import winrm; print('pywinrm OK')"

          # Create ansible wrapper script that forces UTF-8
          $wrapper = @'
          import sys
          import os
          os.environ['PYTHONUTF8'] = '1'
          os.environ['PYTHONIOENCODING'] = 'utf-8'
          if hasattr(sys.stdout, 'reconfigure'):
              sys.stdout.reconfigure(encoding='utf-8')
          if hasattr(sys.stderr, 'reconfigure'):
              sys.stderr.reconfigure(encoding='utf-8')
          '@

          # Create ansible_ping.py wrapper
          $ping_wrapper = $wrapper + "`nfrom ansible.cli.adhoc import main`nsys.argv = ['ansible', 'windows_servers', '-i', 'inventory-local.ini', '-m', 'win_ping', '-v']`nmain()`n"
          $ping_wrapper | Out-File -FilePath ansible\run_ping.py -Encoding utf8

          # Create ansible_deploy.py wrapper
          $deploy_wrapper = $wrapper + "`nfrom ansible.cli.playbook import main`nimport sys`n"
          $deploy_wrapper | Out-File -FilePath ansible\run_deploy.py -Encoding utf8

          Write-Host "Wrapper scripts created"

      - name: Create inventory and ansible.cfg
        shell: powershell
        env:
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          $python = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\python.exe"
          $inv = "[windows_servers]`nyour-pc ansible_host=127.0.0.1`n`n[windows_servers:vars]`nansible_user=$env:WINDOWS_USER`nansible_password=$env:WINDOWS_PASSWORD`nansible_connection=winrm`nansible_winrm_transport=basic`nansible_winrm_port=5985`nansible_winrm_scheme=http`nansible_winrm_server_cert_validation=ignore`nansible_python_interpreter=$python"
          $inv | Out-File -FilePath ansible\inventory-local.ini -Encoding utf8
          $cfg = "[defaults]`nhost_key_checking=False`nretry_files_enabled=False`nroles_path=roles"
          $cfg | Out-File -FilePath ansible\ansible.cfg -Encoding utf8
          Write-Host "Inventory:"
          Get-Content ansible\inventory-local.ini

      - name: Test WinRM ping localhost
        shell: powershell
        run: |
          $python = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\python.exe"
          cd ansible
          & $python -X utf8 run_ping.py

      - name: Deploy via Ansible
        shell: powershell
        run: |
          $python = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\python.exe"
          $playbook = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\Scripts\ansible-playbook.exe"
          cd ansible
          $env:PYTHONUTF8 = "1"
          $env:PYTHONIOENCODING = "utf-8"
          # Use ansible-playbook.exe directly with UTF8 env vars set
          & $python -X utf8 -c "
          import sys, os
          os.environ['PYTHONUTF8']='1'
          os.environ['PYTHONIOENCODING']='utf-8'
          sys.argv = ['ansible-playbook', '-i', 'inventory-local.ini', 'deploy.yml', '--extra-vars', 'war_src=../target/sample-webapp.war', '-v']
          from ansible.cli.playbook import main
          main()
          "

      - name: Verify app
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8080/sample-webapp/" -UseBasicParsing
            Write-Host "SUCCESS - HTTP Status: $($r.StatusCode)"
          } catch {
            Write-Host "Check manually at http://localhost:8080/sample-webapp/"
          }

  summary:
    name: Pipeline Summary
    runs-on: self-hosted
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        shell: powershell
        run: |
          Write-Host "Build           : ${{ needs.build.result }}"
          Write-Host "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
