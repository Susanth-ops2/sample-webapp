name: CI/CD Pipeline - Self Hosted Windows (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build with Maven
        shell: powershell
        run: |
          $mvn = "C:\Users\ssusanthakumar\apache-maven-3.9.12\bin\mvn.cmd"
          if (Test-Path $mvn) { & $mvn clean package -DskipTests=false }
          else { mvn clean package -DskipTests=false }

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy via Ansible in Docker
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Create inventory file
        shell: powershell
        env:
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          # Docker gateway IP - how Docker container reaches Windows host
          $hostIP = "172.17.0.1"
          Write-Host "Using Docker gateway IP: $hostIP"

          $lines = @(
            "[windows_servers]",
            "your-pc ansible_host=$hostIP",
            "",
            "[windows_servers:vars]",
            "ansible_user=$env:WINDOWS_USER",
            "ansible_password=$env:WINDOWS_PASSWORD",
            "ansible_connection=winrm",
            "ansible_winrm_transport=basic",
            "ansible_winrm_port=5985",
            "ansible_winrm_scheme=http",
            "ansible_winrm_server_cert_validation=ignore",
            "ansible_winrm_operation_timeout_sec=60",
            "ansible_winrm_read_timeout_sec=70"
          )
          [System.IO.File]::WriteAllText("$PWD\ansible\inventory-local.ini", ($lines -join "`n"))
          Write-Host "Inventory:"
          Get-Content ansible\inventory-local.ini

      - name: Allow WinRM from Docker network
        shell: powershell
        run: |
          # Allow Docker subnet 172.17.0.0/16 through firewall
          $ruleName = "WinRM-Docker"
          $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
          if (-not $existing) {
            New-NetFirewallRule -DisplayName $ruleName `
              -Direction Inbound -Protocol TCP `
              -LocalPort 5985 -RemoteAddress "172.17.0.0/16" `
              -Action Allow
            Write-Host "Firewall rule added for Docker subnet"
          } else {
            Write-Host "Firewall rule already exists"
          }
          # Verify WinRM listening
          netstat -an | findstr "5985"

      - name: Test WinRM ping via Ansible in Docker
        shell: powershell
        run: |
          $ansiblePath = (Resolve-Path "ansible").Path
          $targetPath  = (Resolve-Path "target").Path
          docker run --rm `
            -v "${ansiblePath}:/ansible" `
            -v "${targetPath}:/target" `
            -w /ansible `
            -e ANSIBLE_HOST_KEY_CHECKING=False `
            -e ANSIBLE_RETRY_FILES_ENABLED=False `
            cytopia/ansible:latest-tools `
            sh -c "pip install pywinrm requests-ntlm -q && ansible windows_servers -i inventory-local.ini -m win_ping -v"

      - name: Deploy WAR via Ansible in Docker
        shell: powershell
        run: |
          $ansiblePath = (Resolve-Path "ansible").Path
          $targetPath  = (Resolve-Path "target").Path
          docker run --rm `
            -v "${ansiblePath}:/ansible" `
            -v "${targetPath}:/target" `
            -w /ansible `
            -e ANSIBLE_HOST_KEY_CHECKING=False `
            -e ANSIBLE_RETRY_FILES_ENABLED=False `
            cytopia/ansible:latest-tools `
            sh -c "pip install pywinrm requests-ntlm -q && ansible-playbook -i inventory-local.ini deploy.yml --extra-vars 'war_src=/target/sample-webapp.war' -v"

      - name: Verify app is running
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8080/sample-webapp/" -UseBasicParsing
            Write-Host "SUCCESS! HTTP Status: $($r.StatusCode)"
            Write-Host "App live at: http://localhost:8080/sample-webapp/"
          } catch {
            Write-Host "Check manually: http://localhost:8080/sample-webapp/"
          }

  summary:
    name: Pipeline Summary
    runs-on: self-hosted
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        shell: powershell
        run: |
          Write-Host "Build           : ${{ needs.build.result }}"
          Write-Host "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
