name: CI/CD Pipeline - Self Hosted Windows (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy to Localhost
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Find Python and install packages
        shell: powershell
        run: |
          $python = "C:\Users\ssusanthakumar\AppData\Local\Programs\Python\Python313\python.exe"
          if (-not (Test-Path $python)) {
            $python = (Get-Command python -ErrorAction SilentlyContinue).Source
          }
          Write-Host "Using Python: $python"
          "PYTHON_EXE=$python" | Out-File -FilePath $env:GITHUB_ENV -Append
          & $python -m pip install --upgrade pip
          & $python -m pip install ansible pywinrm requests-ntlm
          & $python -c "import winrm; print('pywinrm OK')"

      - name: Create inventory and ansible.cfg
        shell: powershell
        env:
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          $inv = "[windows_servers]`nyour-pc ansible_host=127.0.0.1`n`n[windows_servers:vars]`nansible_user=$env:WINDOWS_USER`nansible_password=$env:WINDOWS_PASSWORD`nansible_connection=winrm`nansible_winrm_transport=basic`nansible_winrm_port=5985`nansible_winrm_scheme=http`nansible_winrm_server_cert_validation=ignore`nansible_python_interpreter=$env:PYTHON_EXE"
          $inv | Out-File -FilePath ansible\inventory-local.ini -Encoding utf8
          $cfg = "[defaults]`nhost_key_checking=False`nretry_files_enabled=False`nroles_path=roles"
          $cfg | Out-File -FilePath ansible\ansible.cfg -Encoding utf8
          Write-Host "Inventory created:"
          Get-Content ansible\inventory-local.ini

      - name: Test WinRM ping localhost
        shell: powershell
        run: |
          cd ansible
          & $env:PYTHON_EXE -m ansible windows_servers -i inventory-local.ini -m win_ping -v

      - name: Deploy via Ansible
        shell: powershell
        run: |
          cd ansible
          & $env:PYTHON_EXE -m ansible-playbook -i inventory-local.ini deploy.yml --extra-vars "war_src=../target/sample-webapp.war" -v

      - name: Verify app
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8080/sample-webapp/" -UseBasicParsing
            Write-Host "SUCCESS - HTTP Status: $($r.StatusCode)"
          } catch {
            Write-Host "Check manually at http://localhost:8080/sample-webapp/"
          }

  summary:
    name: Pipeline Summary
    runs-on: self-hosted
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        shell: powershell
        run: |
          Write-Host "Build           : ${{ needs.build.result }}"
          Write-Host "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
