name: CI/CD Pipeline - Self Hosted Windows (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: self-hosted
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy via Ansible in Docker
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Create inventory file
        shell: powershell
        env:
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          $hostIP = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.InterfaceAlias -notlike "*Loopback*" -and $_.InterfaceAlias -notlike "*docker*" -and $_.InterfaceAlias -notlike "*vEthernet*" } | Select-Object -First 1).IPAddress
          Write-Host "Host IP for Docker: $hostIP"
          Set-Content -Path ansible\inventory-local.ini -Value "[windows_servers]`nyour-pc ansible_host=$hostIP`n`n[windows_servers:vars]`nansible_user=$env:WINDOWS_USER`nansible_password=$env:WINDOWS_PASSWORD`nansible_connection=winrm`nansible_winrm_transport=basic`nansible_winrm_port=5985`nansible_winrm_scheme=http`nansible_winrm_server_cert_validation=ignore" -Encoding utf8
          Set-Content -Path ansible\ansible.cfg -Value "[defaults]`nhost_key_checking=False`nretry_files_enabled=False`nroles_path=roles" -Encoding utf8
          Write-Host "Inventory:"
          Get-Content ansible\inventory-local.ini

      - name: Test WinRM ping via Ansible in Docker
        shell: powershell
        run: |
          $ansiblePath = (Resolve-Path "ansible").Path
          $targetPath = (Resolve-Path "target").Path
          docker run --rm -v "${ansiblePath}:/ansible" -v "${targetPath}:/target" -w /ansible cytopia/ansible:latest-tools sh -c "pip install pywinrm requests-ntlm -q && ansible windows_servers -i inventory-local.ini -m win_ping -v"

      - name: Deploy WAR via Ansible in Docker
        shell: powershell
        run: |
          $ansiblePath = (Resolve-Path "ansible").Path
          $targetPath = (Resolve-Path "target").Path
          docker run --rm -v "${ansiblePath}:/ansible" -v "${targetPath}:/target" -w /ansible cytopia/ansible:latest-tools sh -c "pip install pywinrm requests-ntlm -q && ansible-playbook -i inventory-local.ini deploy.yml --extra-vars 'war_src=/target/sample-webapp.war' -v"

      - name: Verify app is running
        shell: powershell
        run: |
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest -Uri "http://127.0.0.1:8080/sample-webapp/" -UseBasicParsing
            Write-Host "SUCCESS! HTTP Status: $($r.StatusCode)"
            Write-Host "App live at: http://localhost:8080/sample-webapp/"
          } catch {
            Write-Host "Check manually: http://localhost:8080/sample-webapp/"
          }

  summary:
    name: Pipeline Summary
    runs-on: self-hosted
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        shell: powershell
        run: |
          Write-Host "Build           : ${{ needs.build.result }}"
          Write-Host "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
