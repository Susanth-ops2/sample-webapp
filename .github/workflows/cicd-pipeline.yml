name: CI/CD Pipeline - Localhost Only (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy to Localhost
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Debug - find all Python and Ansible paths
        run: |
          echo "=== which python3 ==="
          which python3
          python3 --version

          echo "=== which ansible ==="
          which ansible
          ansible --version

          echo "=== Ansible python path ==="
          ansible --version | grep "python"

          echo "=== All python3 binaries ==="
          find /usr -name "python3*" -type f 2>/dev/null

          echo "=== Try import winrm ==="
          python3 -c "import winrm; print('OK')" || echo "FAIL - not found in python3"

          echo "=== python3.12 path ==="
          ls /usr/bin/python3* 2>/dev/null

      - name: Install pywinrm all methods
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible python3-winrm python3-requests-ntlm

          echo "=== after apt install ==="
          python3 -c "import winrm; print('apt install OK')" || echo "STILL FAIL"

          echo "=== Ansible python executable ==="
          ANSIBLE_PY=$(ansible --version | grep "python executable" | awk '{print $NF}')
          echo "Ansible uses: $ANSIBLE_PY"

          echo "=== install into ansible python ==="
          sudo $ANSIBLE_PY -m pip install pywinrm --break-system-packages 2>/dev/null || true
          sudo $ANSIBLE_PY -m pip install requests-ntlm --break-system-packages 2>/dev/null || true

          echo "=== verify with ansible python ==="
          $ANSIBLE_PY -c "import winrm; print('ANSIBLE PYTHON OK')" || echo "STILL FAIL"

      - name: Overwrite ansible.cfg with no transport
        run: |
          cat > ansible/ansible.cfg << 'EOF'
          [defaults]
          host_key_checking   = False
          retry_files_enabled = False
          roles_path          = roles
          EOF
          cat ansible/ansible.cfg

      - name: Create inventory
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          ANSIBLE_PY=$(ansible --version | grep "python executable" | awk '{print $NF}')
          echo "Setting ansible_python_interpreter to: $ANSIBLE_PY"

          cat > ansible/inventory-local.ini << EOF
          [windows_servers]
          your-pc ansible_host=${YOUR_PC_IP}

          [windows_servers:vars]
          ansible_user=${WINDOWS_USER}
          ansible_password=${WINDOWS_PASSWORD}
          ansible_connection=winrm
          ansible_winrm_transport=basic
          ansible_winrm_port=5985
          ansible_winrm_scheme=http
          ansible_winrm_server_cert_validation=ignore
          ansible_python_interpreter=${ANSIBLE_PY}
          EOF

          echo "--- inventory (password hidden) ---"
          grep -v password ansible/inventory-local.ini

      - name: Test WinRM ping
        run: |
          cd ansible
          ansible windows_servers -i inventory-local.ini -m win_ping -v

      - name: Deploy via Ansible
        run: |
          cd ansible
          ansible-playbook -i inventory-local.ini deploy.yml \
            --extra-vars "war_src=../target/sample-webapp.war" -v

      - name: Verify app
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
        run: |
          sleep 15
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            http://${YOUR_PC_IP}:8080/sample-webapp/ || echo "Check manually"

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        run: |
          echo "Build           : ${{ needs.build.result }}"
          echo "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
