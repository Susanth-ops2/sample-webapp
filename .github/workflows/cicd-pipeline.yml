name: CI/CD Pipeline - Localhost Only (Phase 1)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build:
    name: Maven Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-webapp-war
          path: target/sample-webapp.war
          retention-days: 5

  deploy-localhost:
    name: Deploy to Localhost
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: sample-webapp-war
          path: target/

      - name: Setup Python 3.11 and install pywinrm
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and pywinrm into same Python
        run: |
          # Use the python from setup-python action
          python --version
          which python
          which pip

          # Install ansible and pywinrm into SAME python environment
          pip install ansible
          pip install pywinrm
          pip install requests-ntlm
          pip install requests-credssp

          # Verify both in same environment
          python -c "import winrm; print('winrm OK')"
          ansible --version
          echo "Ansible python: $(ansible --version | grep python)"

      - name: Overwrite ansible.cfg
        run: |
          cat > ansible/ansible.cfg << 'EOF'
          [defaults]
          host_key_checking   = False
          retry_files_enabled = False
          roles_path          = roles
          EOF

      - name: Create inventory
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
          WINDOWS_USER: ${{ secrets.WINDOWS_USER }}
          WINDOWS_PASSWORD: ${{ secrets.WINDOWS_PASSWORD }}
        run: |
          PYTHON_PATH=$(which python)
          echo "Python path: $PYTHON_PATH"

          cat > ansible/inventory-local.ini << EOF
          [windows_servers]
          your-pc ansible_host=${YOUR_PC_IP}

          [windows_servers:vars]
          ansible_user=${WINDOWS_USER}
          ansible_password=${WINDOWS_PASSWORD}
          ansible_connection=winrm
          ansible_winrm_transport=basic
          ansible_winrm_port=5985
          ansible_winrm_scheme=http
          ansible_winrm_server_cert_validation=ignore
          ansible_python_interpreter=${PYTHON_PATH}
          EOF

          echo "--- inventory (password hidden) ---"
          grep -v password ansible/inventory-local.ini

      - name: Test WinRM ping
        run: |
          cd ansible
          ansible windows_servers -i inventory-local.ini -m win_ping -v

      - name: Deploy via Ansible
        run: |
          cd ansible
          ansible-playbook -i inventory-local.ini deploy.yml \
            --extra-vars "war_src=../target/sample-webapp.war" -v

      - name: Verify app
        env:
          YOUR_PC_IP: ${{ secrets.YOUR_PC_IP }}
        run: |
          sleep 15
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            http://${YOUR_PC_IP}:8080/sample-webapp/ || echo "Check manually"

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, deploy-localhost]
    if: always()
    steps:
      - name: Show Results
        run: |
          echo "Build           : ${{ needs.build.result }}"
          echo "Deploy Localhost: ${{ needs.deploy-localhost.result }}"
